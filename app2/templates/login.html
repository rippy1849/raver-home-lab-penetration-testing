{% extends "base.html" %}
{% block content %}
<div class='page-wrapper narrow'>
  <div style='text-align:center;margin-bottom:32px'>
    <div style='font-family:Righteous,cursive;font-size:1.8rem;margin-bottom:6px'>
      <span class='rainbow-text'>Sign in to DropZone</span>
    </div>
    <p style='color:var(--muted);font-size:.875rem'>Welcome back to the community</p>
  </div>
  <div class='card'>
    {% if error %}
      <div class='alert alert-error'>⚠ {{ error }}</div>
    {% endif %}
    <form method='POST'>
      <div class='form-group'>
        <label>Username</label>
        <input class='form-control' type='text' name='username' placeholder='your handle' autocomplete='username'>
      </div>
      <div class='form-group'>
        <label>Password</label>
        <input class='form-control' type='password' name='password' placeholder='••••••••' autocomplete='current-password'>
      </div>
      <button type='submit' class='btn btn-primary' style='width:100%;justify-content:center'>Sign In</button>
    </form>
  </div>
  <p style='text-align:center;color:var(--muted);font-size:.8rem;margin-top:16px'>
    Accounts: griz / rezz / lsdream / subtronics
  </p>
</div>
{% endblock %}
